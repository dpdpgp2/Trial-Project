name: Offline tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Only the light deps the offline import chain touches — not the ML stack (torch etc.),
      # which the offline suite never imports.
      - run: pip install feedparser==6.0.11 gspread==6.1.2
      - name: Compile
        run: python -m py_compile dc_ai.py dc_pipeline.py dc_state_context.py eval_qa.py test_desk.py
      - name: Offline suite + self-checks
        run: |
          python test_desk.py
          python eval_qa.py --selftest
          python dc_state_context.py
