name: Inspect Sheet (read-only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install gspread google-auth
      - name: Dump tabs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DC_SPREADSHEET_ID: ${{ secrets.DC_SPREADSHEET_ID }}
        run: python inspect_sheet.py
