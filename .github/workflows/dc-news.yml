name: DC News (SS1)

on:
  schedule:
    - cron: "23 */3 * * *"      # ~every 3 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dc-news
  cancel-in-progress: false

jobs:
  ss1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run SS1 news pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DC_SPREADSHEET_ID: ${{ secrets.DC_SPREADSHEET_ID }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          set -o pipefail
          python dc_news.py 2>&1 | tee run.log

      - name: Commit updated state
        run: |
          git config user.name  "dc-engine-bot"
          git config user.email "dc-engine-bot@users.noreply.github.com"
          git add dc_news_state.json
          if git diff --staged --quiet; then
            echo "No state change."
          else
            git commit -m "Update SS1 state [skip ci]"
            # Derived state, latest run wins: auto-resolve overlap to this run + retry the race.
            for i in 1 2 3; do
              git pull --rebase -X theirs origin "${{ github.ref_name }}" && git push && break
              echo "state push race, retry $i"; sleep 5
            done
          fi
