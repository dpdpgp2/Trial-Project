<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TAG BD Intelligence — Data Centres</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">
<style>
/* var names are legacy (navy/acid) — values are the deep-red theme */
:root{--navy:#6E1423;--navy-l:#8C1C2C;--char:#2E1A1E;--acid:#E9B44C;--acid-dk:#92400E;
--bg:#F5F6F8;--surface:#FFFFFF;--line:#E7E9EE;--line-2:#D8DBE3;
--ink:#1C1E2A;--ink-2:#4A4F5E;--ink-3:#616774;
--pos:#15805A;--pos-bg:#E7F5EE;--neg:#B3261E;--neg-bg:#FCEBEA;--neu:#6B7081;
--sharp:#B3261E;--sharp-bg:#FCEBEA;--tact:#8F5A0A;--tact-bg:#FBF0DC;--strat:#2F6F8C;--strat-bg:#E4F0F5;
--news:#3F3D9E;--policy:#9A6310;--talent:#1B7A4F;--capital:#15589C;--osint:#7A3FA0;--disc:#7C4A2D;
--rail:62px;--rail-open:240px;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}a{color:inherit;text-decoration:none}

#rail{position:fixed;top:0;left:0;bottom:0;width:var(--rail);background:var(--navy);z-index:40;display:flex;flex-direction:column;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden;border-right:1px solid rgba(255,255,255,.06)}
#rail:hover{width:var(--rail-open);box-shadow:4px 0 24px rgba(20,22,45,.18)}
.brand{height:58px;display:flex;align-items:center;gap:12px;padding:0 19px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .mark{min-width:26px;width:26px;height:26px;border-radius:7px;background:var(--acid);display:flex;align-items:center;justify-content:center;color:var(--navy);font-weight:700;font-size:14px}
.brand .wm{color:#fff;font-weight:600;font-size:15px;letter-spacing:.2px;white-space:nowrap;opacity:0;transition:opacity .18s}#rail:hover .brand .wm{opacity:1}
.nav{flex:1;padding:10px 0;display:flex;flex-direction:column;gap:1px;overflow-y:auto}.nav::-webkit-scrollbar{width:0}
.nsec{padding:14px 19px 6px;color:rgba(255,255,255,.32);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;opacity:0;transition:opacity .18s}#rail:hover .nsec{opacity:1}
.nlink{display:flex;align-items:center;gap:14px;height:42px;padding:0 19px;color:rgba(255,255,255,.66);white-space:nowrap;position:relative;transition:color .15s,background .15s;cursor:pointer}
.nlink i{min-width:24px;font-size:20px;text-align:center}.nlink span{font-size:14px;font-weight:500;opacity:0;transition:opacity .18s}#rail:hover .nlink span{opacity:1}
.nlink:hover{color:#fff;background:rgba(255,255,255,.05)}.nlink.on{color:#fff}
.nlink.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--acid);border-radius:0 3px 3px 0}.nlink.on i{color:var(--acid)}
.nlink.soon{color:rgba(255,255,255,.36)}.nlink.soon:hover{color:rgba(255,255,255,.55)}
.ndot{margin-left:auto;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.3);opacity:0;transition:opacity .18s}#rail:hover .ndot{opacity:1}
.nbadge{margin-left:auto;background:var(--acid);color:var(--navy);font-size:11px;font-weight:600;border-radius:9px;padding:1px 7px;opacity:0;transition:opacity .18s}#rail:hover .nbadge{opacity:1}
.railfoot{flex-shrink:0;border-top:1px solid rgba(255,255,255,.07);padding:8px 0}

#main{margin-left:var(--rail);min-height:100vh;display:flex;flex-direction:column}
#topbar{height:58px;background:var(--char);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:30;border-bottom:1px solid rgba(0,0,0,.2)}
.crumb{color:rgba(255,255,255,.65);font-size:13px;display:flex;align-items:center;gap:7px}.crumb b{color:#fff;font-weight:600}.crumb .sep{opacity:.4}
.crumb .clk{cursor:pointer}.crumb .clk:hover{color:#fff}
.searchbox{position:relative;margin-left:8px;flex:1;max-width:400px;height:35px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;gap:8px;padding:0 12px}
.sdrop{position:absolute;top:41px;left:-1px;right:-1px;min-width:380px;background:var(--surface);border:1px solid var(--line-2);border-radius:10px;box-shadow:0 8px 32px rgba(30,10,15,.18);max-height:420px;overflow-y:auto;z-index:60;color:var(--ink)}
.sgroup{display:flex;align-items:center;gap:6px;padding:9px 12px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3)}
.sgroup .gdot{width:8px;height:8px;border-radius:50%}
.srow{display:flex;gap:8px;align-items:baseline;padding:7px 12px;font-size:13px;cursor:pointer}.srow:hover{background:var(--bg)}
.srow .sm{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%}
.srow .sl2{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.snone{padding:14px;font-size:13px;color:var(--ink-3)}
.shelp{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:18px}
.shelp summary{padding:12px 16px;font-weight:600;font-size:13px;cursor:pointer;display:flex;gap:8px;align-items:center;color:var(--ink-2);list-style:none}
.shelp summary i{font-size:16px;color:var(--acid-dk)}
.shelp .sbody{padding:0 16px 6px;font-size:13px;color:var(--ink-2);line-height:1.6}
.shelp .sbody p{margin:0 0 10px}
tr.flash>td{animation:flashbg 2.1s ease-out}
.prospect.flash{animation:flashbg 2.1s ease-out}
@keyframes flashbg{0%,40%{background:#FBF3E2;box-shadow:inset 3px 0 0 var(--acid)}100%{background:transparent}}
.searchbox input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:inherit;font-size:13px}.searchbox input::placeholder{color:rgba(255,255,255,.55)}.searchbox i{font-size:17px;color:rgba(255,255,255,.5)}
.topspacer{flex:1}
.fresh{font-size:11px;color:rgba(255,255,255,.45);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap}
.fresh:hover{color:rgba(255,255,255,.8)}
.fresh .fled{width:8px;height:8px;border-radius:50%;background:var(--pos)}.fresh .fled.warn{background:var(--tact)}
.ticon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:19px;position:relative}.ticon:hover{background:rgba(255,255,255,.08);color:#fff}
.dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--acid);border:2px solid var(--char)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--acid);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;cursor:pointer}

#view{padding:28px 34px 64px;max-width:1340px;width:100%}
.eyebrow{color:var(--acid-dk);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.phead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:12px}
.phead h1{font-size:25px;font-weight:600;letter-spacing:-.4px}
.psub{color:var(--ink-2);font-size:14px;margin-bottom:24px;max-width:800px}

/* sector hero */
.shero{display:flex;align-items:center;gap:18px;background:linear-gradient(110deg,var(--navy),var(--navy-l));border-radius:16px;padding:22px 26px;color:#fff;margin-bottom:24px;flex-wrap:wrap}
.shero .sicon{width:54px;height:54px;border-radius:13px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--acid)}
.shero h1{font-size:23px;font-weight:600;letter-spacing:-.3px}
.shero p{color:rgba(255,255,255,.66);font-size:13px;margin-top:2px}
.shero .sstats{margin-left:auto;display:flex;gap:26px}
.shero .sstat{text-align:right}.shero .sstat .n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;display:block}.shero .sstat .l{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.5px}

/* stream block grid */
.blocks{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:920px){.blocks{grid-template-columns:1fr}}
.block{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,box-shadow .15s}
.block:hover{border-color:var(--line-2);box-shadow:0 3px 18px rgba(30,33,60,.07)}
.bhead{display:flex;align-items:center;gap:12px;padding:15px 17px;cursor:pointer;border-bottom:1px solid var(--line)}
.bhead:hover .bt{color:var(--navy)}
.bicon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.bicon.news{background:#EDEDFA;color:var(--news)}.bicon.policy{background:#FBF1DE;color:var(--policy)}
.bicon.ranked{background:#E6F4EC;color:var(--talent)}.bicon.pipeline{background:#E2EFFB;color:var(--capital)}
.bicon.osint{background:#F3EAFA;color:var(--osint)}.bicon.disclosure{background:#F3EAE3;color:var(--disc)}
.bmeta{flex:1;min-width:0}
.bt{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.bt .sheet{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--ink-3);background:var(--bg);border-radius:4px;padding:1px 5px}
.bsub{font-size:11px;color:var(--ink-3);margin-top:2px}
.bstat{text-align:right;flex-shrink:0}
.bstat .bn{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600}
.bstat .bl{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.4px}
.bchev{color:var(--ink-3);font-size:18px;flex-shrink:0}.bhead:hover .bchev{color:var(--navy)}
.bbody{padding:6px 17px 14px;flex:1}
.brow{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13px;border-bottom:1px solid var(--line)}.brow:last-child{border-bottom:none}
.brow .bled{width:6px;height:30px;border-radius:3px;flex-shrink:0}
.brow .bmain{flex:1;min-width:0}.brow .bh{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;font-size:13px}
.brow .bm{font-size:11px;color:var(--ink-3);margin-top:1px;display:flex;gap:9px;flex-wrap:wrap}.brow .bm .src{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink-2)}
.brow .bsc{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;min-width:44px;text-align:right}
.bstub{padding:16px;text-align:center;color:var(--ink-3);font-size:12px;line-height:1.6}
.bfoot{padding:10px 17px;background:#FAFBFC;border-top:1px solid var(--line);font-size:12px;color:var(--navy);font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer}
.bfoot:hover{background:#F4F5FA}.bfoot i{font-size:15px}

/* status chips */
.stchip{font-size:11px;font-weight:600;border-radius:5px;padding:1px 7px;letter-spacing:.3px}
.stchip.live{background:var(--pos-bg);color:var(--pos)}.stchip.dev{background:var(--tact-bg);color:var(--tact)}.stchip.soon{background:var(--bg);color:var(--ink-3)}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:14px;margin-bottom:24px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.metric .lbl{color:var(--ink-3);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}.metric .lbl i{font-size:15px}
.metric .val{font-size:24px;font-weight:600;margin-top:8px;letter-spacing:-.5px}.metric .delta{font-size:12px;font-weight:500;margin-top:3px}
.up{color:var(--pos)}.down{color:var(--neg)}.flat{color:var(--neu)}

.shead{display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px;flex-wrap:wrap;gap:10px}
.shead h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px}.shead h2 i{font-size:18px;color:var(--ink-2)}
.shead .sx{color:var(--ink-3);font-size:12px;font-weight:400}
.chip{font-size:12px;font-weight:500;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:6px 11px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--line-2);color:var(--ink)}

/* sector card grid (home) */
.scards{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:16px;margin-bottom:8px}
.scard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.scard:hover{border-color:var(--line-2);box-shadow:0 3px 18px rgba(30,33,60,.07)}
.scard.soon{cursor:default;opacity:.72}.scard.soon:hover{box-shadow:none;border-color:var(--line)}
.scard .ci{width:44px;height:44px;border-radius:11px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:23px;color:var(--navy);margin-bottom:13px}
.scard h3{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.scard p{font-size:12px;color:var(--ink-3);margin-top:4px;line-height:1.5}
.scard .cstats{display:flex;gap:16px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line);flex-wrap:wrap}
.scard .cst .n{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;display:block}.scard .cst .l{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.4px}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px}.panel h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:14px}.panel h3 i{font-size:17px;color:var(--ink-2)}
.trend{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}.trend:last-child{border-bottom:none}.trend .rank{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--ink-3);min-width:18px}.trend .tn{flex:1;font-size:13px;font-weight:500;min-width:0}
.soon-pg{background:var(--surface);border:1px dashed var(--line-2);border-radius:14px;padding:52px;text-align:center;color:var(--ink-2)}
.soon-pg i.big{font-size:42px;color:var(--line-2);display:block;margin-bottom:14px}.soon-pg h3{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}.soon-pg p{max-width:460px;margin:0 auto;font-size:13px}
.empty{padding:30px;text-align:center;color:var(--ink-3);font-size:13px}

/* tags & chips */
.tag{font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.tagwrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.fbgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px 28px;margin-bottom:4px}
.fbrow{display:flex;align-items:center;gap:8px;font-size:12px}
.fbl{width:132px;color:var(--ink-2);flex:none}
.fbbar{flex:1;height:6px;background:var(--bg);border:1px solid var(--line);border-radius:3px;overflow:hidden}
.fbbar div{height:100%;background:var(--navy);border-radius:2px}
.fbv{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);width:46px;text-align:right;flex:none}
.fbm{color:var(--ink-3)}
.tag.p1{background:var(--sharp-bg);color:var(--sharp)}.tag.p2{background:var(--tact-bg);color:var(--tact)}.tag.p3{background:var(--strat-bg);color:var(--strat)}
.tag.strong{background:var(--pos-bg);color:var(--pos)}.tag.moderate{background:var(--tact-bg);color:var(--tact)}.tag.weak{background:var(--bg);color:var(--ink-3)}
.tag.geo{background:#F7EDEA;color:var(--navy)}.tag.plain{background:var(--bg);color:var(--ink-2)}
.tag.hi{background:var(--pos-bg);color:var(--pos)}.tag.md{background:var(--tact-bg);color:var(--tact)}.tag.lo{background:var(--bg);color:var(--ink-3)}
.tag.foreign{background:#F3EAFA;color:var(--osint)}
.aichip{font-size:10px;font-weight:600;color:var(--acid-dk);background:#FBF3E2;border-radius:4px;padding:1px 6px;margin-right:6px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}

/* tables */
.twrap{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:14px}
.matrix{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:640px}
.matrix th{background:#FAFBFC;text-align:left;padding:12px 14px;font-size:11px;font-weight:600;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);white-space:nowrap}
.matrix th.sort{cursor:pointer;user-select:none}.matrix th.sort:hover{color:var(--navy)}
.matrix th .sarr{font-size:10px;color:var(--navy)}
.matrix td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}.matrix tr:last-child td{border-bottom:none}.matrix tbody tr:hover td{background:#FAFBFC}
.cellh{font-weight:500;color:var(--ink);max-width:440px;line-height:1.45}
.matrix a.ext{color:var(--ink-3);font-size:16px}.matrix a.ext:hover{color:var(--navy)}
.matrix a.tlink{color:var(--ink);font-weight:500}.matrix a.tlink:hover{color:var(--navy);text-decoration:underline}
.subrow td{background:#FAFBFC;padding:6px 14px 14px}
.evtx{font-size:12px;font-weight:500;color:var(--ink-2);display:inline-flex;align-items:center;gap:5px;cursor:pointer}.evtx:hover{color:var(--navy)}.evtx i{transition:transform .18s}.evtx.open i{transform:rotate(180deg)}
.cart{display:flex;align-items:center;gap:12px;padding:8px 0;font-size:13px;border-bottom:1px solid var(--line)}.cart:last-child{border-bottom:none}
.cart .cs{font-size:11px;font-weight:600;color:var(--navy);min-width:88px;font-family:'IBM Plex Mono',monospace}.cart .ch{flex:1;color:var(--ink-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cart .cd{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3);white-space:nowrap}.cart a{color:var(--ink-3);font-size:16px}.cart a:hover{color:var(--navy)}
.qev{font-size:12.5px;color:var(--ink-2);line-height:1.55;background:var(--bg);border-radius:8px;padding:9px 11px;margin-top:6px;border-left:2px solid var(--line-2);font-style:italic;max-width:520px;white-space:pre-wrap}

/* prospect cards */
.pfeed{display:flex;flex-direction:column;gap:14px}
.prospect{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}.prospect:hover{border-color:var(--line-2);box-shadow:0 2px 16px rgba(30,33,60,.07)}
.prospect.pri1{border-left:3px solid var(--sharp)}.prospect.pri2{border-left:3px solid var(--tact)}.prospect.pri3{border-left:3px solid var(--strat)}
.ptop{display:flex;align-items:flex-start;gap:16px;padding:16px 18px 14px}.prank{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--ink-3);min-width:30px;line-height:1.5}.pmain{flex:1;min-width:0}
.pco{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.pco h3{font-size:17px;font-weight:600;letter-spacing:-.2px}
.ptrigger{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);flex-wrap:wrap}.ptrigger .tk{font-weight:600;color:var(--navy);background:#F7EDEA;border-radius:6px;padding:2px 9px;font-size:12px;display:inline-flex;align-items:center;gap:5px}.ptrigger .tk i{font-size:14px}
.pthesis{margin-top:11px;font-size:13px;color:var(--ink-2);line-height:1.6;max-width:680px}.pthesis b{color:var(--ink)}
.pscore{width:184px;flex-shrink:0;border-left:1px solid var(--line);padding-left:16px;display:flex;flex-direction:column;gap:11px}
.sblock .sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);margin-bottom:3px;display:flex;justify-content:space-between}
.sval2{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600}
.pfoot{display:flex;align-items:center;gap:16px;padding:11px 18px;background:#FAFBFC;border-top:1px solid var(--line);flex-wrap:wrap}
.fmeta{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:6px}.fmeta b{font-family:'IBM Plex Mono',monospace;color:var(--ink);font-weight:600}.fmeta i{font-size:15px;color:var(--ink-3)}.fspace{flex:1}
.fbtn{font-size:12px;font-weight:500;color:var(--navy);border:1px solid var(--line-2);border-radius:7px;padding:5px 11px;background:var(--surface);display:inline-flex;align-items:center;gap:5px}.fbtn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}.fbtn i{font-size:15px}
.evid{display:none;padding:0 18px 16px;border-top:1px dashed var(--line-2)}.evid.open{display:block}.evid .et{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);margin:14px 0 8px}
.aigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.aicell{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12.5px;color:var(--ink-2);line-height:1.5}
.aicell .al{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px;margin-bottom:3px}

/* ai summary */
.aipanel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px 24px}
.aipanel pre{font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.7;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.aimeta{display:flex;gap:14px;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line);flex-wrap:wrap}

/* loading / error */
.loadpg{padding:90px 30px;text-align:center;color:var(--ink-3)}
.loadpg .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--navy);border-radius:50%;margin:0 auto 18px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.errpg{background:var(--neg-bg);border:1px solid #F2C9C6;border-radius:14px;padding:42px;text-align:center;color:var(--neg);max-width:640px;margin:60px auto}
.errpg i{font-size:38px;display:block;margin-bottom:12px}.errpg h3{font-size:17px;font-weight:600;margin-bottom:6px}.errpg p{font-size:13px;color:#9E3832}
.errpg .fbtn{margin-top:18px;border-color:#E4A8A4;color:var(--neg)}
</style></head>
<body>
<aside id="rail">
  <div class="brand"><div class="mark">T</div><div class="wm">TAG BD Intelligence</div></div>
  <nav class="nav" id="nav">
    <div class="nsec">BD workspace</div>
    <a class="nlink on" data-view="home"><i class="ti ti-layout-dashboard"></i><span>Overview</span></a>
    <a class="nlink" data-view="prospects"><i class="ti ti-target"></i><span>Prospects</span><span class="nbadge" id="pBadge"></span></a>
    <a class="nlink" data-view="md"><i class="ti ti-clipboard-list"></i><span>MD View</span></a>
    <a class="nlink" data-view="gcc"><i class="ti ti-world"></i><span>GCC Watch</span></a>
    <a class="nlink" data-view="ai"><i class="ti ti-sparkles"></i><span>AI Summary</span></a>
    <a class="nlink" data-view="health"><i class="ti ti-heart-rate-monitor"></i><span>Feed health</span></a>
    <div class="nsec">Sectors</div>
    <a class="nlink" data-sector="dc"><i class="ti ti-server-2"></i><span>Data Centres</span><span class="ndot">live</span></a>
    <a class="nlink soon" data-sector="Energy"><i class="ti ti-bolt"></i><span>Energy</span><span class="ndot">soon</span></a>
    <a class="nlink soon" data-sector="Defense"><i class="ti ti-shield"></i><span>Defense</span><span class="ndot">soon</span></a>
    <div class="nsec">Targeting</div>
    <a class="nlink" data-view="states"><i class="ti ti-map-pin"></i><span>State Targeting</span></a>
  </nav>
  <div class="railfoot"><a class="nlink"><i class="ti ti-settings"></i><span>Settings</span></a></div>
</aside>
<div id="main">
  <header id="topbar">
    <div class="crumb" id="crumb"><b>TAG</b></div>
    <div class="searchbox"><i class="ti ti-search"></i><input id="sinput" placeholder="Search companies, signals, streams..."/><div class="sdrop" id="sdrop" hidden></div></div>
    <div class="topspacer"></div>
    <div class="fresh" id="freshness" title="Feed health"></div>
    <button class="ticon"><i class="ti ti-bell"></i><span class="dot"></span></button>
    <div class="avatar">DP</div>
  </header>
  <main id="view"></main>
</div>
<script>
'use strict';
let DATA=null;

/* ---------- helpers ---------- */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function dash(v){return (v==null||v==='')?'<span style="color:var(--ink-3)">—</span>':esc(v);}
function num(v,d){return (v==null||v==='')?'—':(typeof v==='number'?v.toFixed(d==null?0:d):esc(v));}
function shortDate(s){if(!s)return'—';const p=String(s).split(' ')[0].split('-');if(p.length<3)return esc(s);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return (M[parseInt(p[1],10)-1]||p[1])+' '+parseInt(p[2],10)+' '+p[0];}
function extLink(url){return url?`<a class="ext" href="${esc(url)}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i></a>`:'';}
function titleLink(title,url){const t=esc(title||'—');return url?`<a class="tlink" href="${esc(url)}" target="_blank" rel="noopener">${t}</a>`:t;}
function priCls(p){const m=/^P([123])/.exec(p||'');return m?('p'+m[1]):'plain';}
function priBorder(p){const m=/^P([123])/.exec(p||'');return m?('pri'+m[1]):'';}
function bandTag(b){return b?`<span class="tag ${esc(String(b).toLowerCase())}">${esc(b)}</span>`:'—';}
function confTag(c){if(!c)return dash(null);const k=/^hi/i.test(c)?'hi':/^(me|md)/i.test(c)?'md':'lo';return `<span class="tag ${k}">${esc(c)}</span>`;}
function metric(lbl,icon,val,delta,dir){return `<div class="metric"><div class="lbl"><i class="ti ${icon}"></i>${lbl}</div><div class="val mono">${val}</div><div class="delta ${dir||'flat'}">${delta||''}</div></div>`;}
function emptyState(msg){return `<div class="empty"><i class="ti ti-inbox" style="font-size:26px;display:block;margin-bottom:8px;color:var(--line-2)"></i>${esc(msg)}</div>`;}
function toggleEl(id,expId){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'':'none';const x=document.getElementById(expId);if(x)x.classList.toggle('open');}

/* ---------- sortable table engine ---------- */
const TBL={};
function renderTable(id,cols,rows,rowFn,defKey,defDir){
  TBL[id]={cols,rows,rowFn,key:defKey||null,dir:defDir||-1};
  return `<div class="twrap"><table class="matrix" id="${id}"><thead><tr>${cols.map((c,i)=>
    `<th class="${c.key?'sort':''}" ${c.key?`onclick="sortTbl('${id}',${i})"`:''} ${c.style?`style="${c.style}"`:''}>${c.label}<span class="sarr" id="${id}-s${i}"></span></th>`).join('')}
  </tr></thead><tbody id="${id}-b"></tbody></table></div>`;
}
function paintTbl(id){
  const t=TBL[id];if(!t)return;
  let rows=t.rows.slice();
  if(t.key){rows.sort((a,b)=>{let x=a[t.key],y=b[t.key];if(x==null)x='';if(y==null)y='';
    if(typeof x==='number'||typeof y==='number'){x=Number(x)||0;y=Number(y)||0;return (x-y)*t.dir;}
    return String(x).localeCompare(String(y))*t.dir;});}
  const b=document.getElementById(id+'-b');if(!b)return;
  b.innerHTML=rows.map(t.rowFn).join('')||`<tr><td colspan="${t.cols.length}">${emptyState('No records in this run.')}</td></tr>`;
  t.cols.forEach((c,i)=>{const s=document.getElementById(id+'-s'+i);if(s)s.textContent=(c.key&&c.key===t.key)?(t.dir>0?' ▲':' ▼'):'';});
}
function sortTbl(id,i){const t=TBL[id];const c=t.cols[i];if(!c.key)return;if(t.key===c.key)t.dir=-t.dir;else{t.key=c.key;t.dir=-1;}paintTbl(id);}

/* ---------- streams meta ---------- */
const STREAMS=[
 {key:'news',sheet:'SS1',name:'Sector News',icon:'ti-news',cls:'news',desc:'Grouped events from the daily news scan',get:()=>DATA.events,unit:'events'},
 {key:'policy',sheet:'SS2',name:'Policy Shifts',icon:'ti-gavel',cls:'policy',desc:'State & central incentives, rules, land / power policy',get:()=>DATA.policy,unit:'items'},
 {key:'disclosure',sheet:'SS3',name:'Disclosures',icon:'ti-file-certificate',cls:'disclosure',desc:'SEC filings with India / GCC data-centre intent',get:()=>DATA.disclosures,unit:'filings'},
 {key:'osint',sheet:'SS4',name:'OSINT Signals',icon:'ti-satellite',cls:'osint',desc:'Jobs, tenders, land records & other open-source intent',get:()=>DATA.osint,unit:'signals'},
 {key:'ranked',sheet:'SS5',name:'Ranked Operators',icon:'ti-chart-bar',cls:'ranked',desc:'Operators scored on signal momentum & policy tailwind',get:()=>DATA.prospects,unit:'operators'},
 {key:'pipeline',sheet:'BD',name:'BD Pipeline',icon:'ti-target-arrow',cls:'pipeline',desc:'Prioritised accounts — P1 act now / P2 monitor / P3 park',get:()=>DATA.prospects.filter(p=>p.bd_priority),unit:'accounts'},
];

/* ---------- OVERVIEW ---------- */
function viewHome(){
  const k=DATA.kpis||{};
  const dcStats=`<div class="cstats">
    <div class="cst"><span class="n">${k.operators_ranked??'—'}</span><span class="l">Ranked</span></div>
    <div class="cst"><span class="n">${k.prospects_p1??'—'}</span><span class="l">P1</span></div>
    <div class="cst"><span class="n">${k.events_active??'—'}</span><span class="l">Events</span></div>
    <div class="cst"><span class="n">${(k.feeds_live??'—')+'/'+(k.feeds_total??'—')}</span><span class="l">Feeds</span></div></div>`;
  const soonCard=(name,icon,desc)=>`<div class="scard soon"><div class="ci"><i class="ti ${icon}"></i></div>
    <h3>${name} <span class="stchip soon">Soon</span></h3><p>${desc}</p>
    <div class="cstats"><div class="cst"><span class="n" style="color:var(--ink-3)">—</span><span class="l">Scoped</span></div></div></div>`;
  const emphasis=(DATA.emphasis||[]);
  return `<div class="eyebrow">Daily intelligence run · ${esc(DATA.generated_at||'')}</div>
  <div class="phead"><h1>BD Intelligence Overview</h1></div>
  <p class="psub">${esc(DATA.sector&&DATA.sector.thesis||'')} Six data streams feed the prospect engine; Data Centres is live, further sectors are scoped.</p>
  <div class="shead" style="margin-top:6px"><h2><i class="ti ti-category-2"></i>Sectors</h2><span class="sx">Click the live sector to open its data streams</span></div>
  <div class="scards">
    <div class="scard" onclick="openSector('dc')"><div class="ci"><i class="ti ti-server-2"></i></div>
      <h3>${esc(DATA.sector&&DATA.sector.name||'Data Centres')} <span class="stchip live">Live</span></h3>
      <p>Power, land, state policy &amp; partner selection across India + GCC</p>${dcStats}</div>
    ${soonCard('Energy','ti-bolt','Oil, gas, power, renewables & smart infra')}
    ${soonCard('Defense','ti-shield','Aerospace, procurement & indigenisation')}
  </div>
  <div class="shead"><h2><i class="ti ti-gauge"></i>This run</h2></div>
  <div class="metrics">
    ${metric('Operators ranked','ti-chart-bar',k.operators_ranked??'—','signal-scored')}
    ${metric('P1 accounts','ti-flame',k.prospects_p1??'—','act now')}
    ${metric('Pipeline total','ti-target',k.pipeline_total??'—','BD accounts')}
    ${metric('Active events','ti-bolt',k.events_active??'—','grouped news')}
    ${metric('Evidence items','ti-files',k.evidence_total??'—','in register')}
    ${metric('Feeds live','ti-rss',(k.feeds_live??'—')+' / '+(k.feeds_total??'—'),'pipeline health')}
  </div>
  <div class="shead"><h2><i class="ti ti-bulb"></i>Areas of emphasis</h2><span class="sx">Auto-generated from this run's signals</span></div>
  <div class="panel">${emphasis.length?emphasis.map((e,i)=>`<div class="trend"><span class="rank">${i+1}</span><span class="tn">${esc(e)}</span></div>`).join(''):emptyState('No emphasis items this run.')}</div>`;
}

/* ---------- SECTOR PAGE ---------- */
function heroDC(){
  const nP=(DATA.prospects||[]).length,nE=(DATA.events||[]).length,nEv=Object.keys(DATA.evidence_register||{}).length;
  return `<div class="shero"><div class="sicon"><i class="ti ti-server-2"></i></div>
    <div><h1>${esc(DATA.sector&&DATA.sector.name||'Data Centres')}</h1><p>${esc(DATA.sector&&DATA.sector.thesis||'')}</p></div>
    <div class="sstats">
      <div class="sstat"><span class="n">${nP}</span><span class="l">Prospects</span></div>
      <div class="sstat"><span class="n">${nE}</span><span class="l">Events</span></div>
      <div class="sstat"><span class="n">${nEv}</span><span class="l">Evidence</span></div>
    </div></div>`;
}
function previewRow(led,head,meta,right){
  return `<div class="brow"><div class="bled" style="background:${led}"></div><div class="bmain"><div class="bh">${head}</div><div class="bm">${meta}</div></div>${right?`<div class="bsc">${right}</div>`:''}</div>`;
}
function streamPreview(key){
  const N=5;
  if(key==='news')return (DATA.events||[]).slice(0,N).map(e=>previewRow('var(--news)',esc(e.headline),`<span class="src">${e.n_sources||0} src</span><span>${e.n_articles||0} articles</span><span>${shortDate(e.last_seen)}</span>`,esc(e.geo||''))).join('');
  if(key==='policy')return (DATA.policy||[]).slice(0,N).map(p=>previewRow('var(--policy)',esc(p.title),`<span class="src">${esc(p.source||'—')}</span><span>${shortDate(p.date)}</span><span>${esc(p.geo||'')}</span>`,esc(p.policy_class||p.type||''))).join('');
  if(key==='disclosure')return (DATA.disclosures||[]).slice(0,N).map(d=>previewRow('var(--disc)',esc(d.filer),`<span class="src">${esc(d.form||'—')}</span><span>${shortDate(d.filed_date)}</span><span>${esc(d.region||'')}</span>`,esc(d.deal_type||''))).join('');
  if(key==='osint')return (DATA.osint||[]).slice(0,N).map(o=>previewRow('var(--osint)',esc(o.excerpt||o.actor),`<span class="src">${esc(o.signal_type||'—')}</span><span>${esc(o.actor||'')}</span><span>${shortDate(o.date)}</span>`,esc(o.geo||''))).join('');
  if(key==='ranked')return (DATA.prospects||[]).slice().sort((a,b)=>(b.signal_score||0)-(a.signal_score||0)).slice(0,N).map(p=>previewRow('var(--talent)',esc(p.company),`<span class="src">${esc(p.signal_band||'')}</span><span>${esc(p.geo||'')}</span><span>${esc(p.tag_play||'')}</span>`,num(p.signal_score,0))).join('');
  if(key==='pipeline'){
    const bd=(DATA.prospects||[]).filter(p=>p.bd_priority);
    const groups=['P1','P2','P3'].map(g=>({g,rows:bd.filter(p=>String(p.bd_priority).startsWith(g))})).filter(x=>x.rows.length);
    return groups.map(x=>x.rows.slice(0,2).map(p=>previewRow(x.g==='P1'?'var(--sharp)':x.g==='P2'?'var(--tact)':'var(--strat)',esc(p.company),`<span class="src">${esc(p.bd_priority)}</span><span>${esc(p.india_stage||'')}</span>`,esc(p.deal_value||''))).join('')).join('');
  }
  return '';
}
function viewSectorDC(){
  return `${heroDC()}
  <div class="shead" style="margin-top:0"><h2><i class="ti ti-stack-2"></i>Data streams</h2><span class="sx">Click any heading to open the full stream</span></div>
  <div class="blocks">${STREAMS.map(s=>{
    const rows=s.get()||[];const preview=streamPreview(s.key)||`<div class="bstub">No ${s.name.toLowerCase()} in this run.</div>`;
    return `<div class="block">
      <div class="bhead" onclick="openStream('${s.key}')">
        <div class="bicon ${s.cls}"><i class="ti ${s.icon}"></i></div>
        <div class="bmeta"><div class="bt">${s.name} <span class="sheet">${s.sheet}</span> <span class="stchip live">Live</span></div><div class="bsub">${s.desc}</div></div>
        <div class="bstat"><div class="bn">${rows.length}</div><div class="bl">${s.unit}</div></div>
        <i class="ti ti-chevron-right bchev"></i></div>
      <div class="bbody">${preview}</div>
      <div class="bfoot" onclick="openStream('${s.key}')"><i class="ti ti-arrow-right"></i>Open ${s.name}</div></div>`;
  }).join('')}</div>`;
}

/* ---------- SCORING EXPLAINER (copy mirrors dc_score.py / dc_bd.py / dc_config.py) ---------- */
function scoreHelp(){
  return `<details class="shelp"><summary><i class="ti ti-info-circle"></i>How scoring works — plain English</summary><div class="sbody">
  <p><b>Signal Score (0–100)</b> — "How much verified activity are we seeing?" A weighted blend of four ingredients: <b>news momentum (35%)</b> — press mentions, where official sources and global wires count full weight, trade press less, low-quality aggregators barely at all, and every mention loses half its weight every 90 days; <b>policy tailwind (20%)</b> — genuine government policy items (incentives, power, land, data rules) tied to the company; <b>India/GCC relevance (25%)</b> — full credit for India signals, partial for GCC-only; <b>partnership signals (20%)</b> — SEC filings showing deals or JVs. Bands: <b>Strong ≥ 60 · Moderate 40–59 · Weak &lt; 40</b>.</p>
  <p><b>Momentum</b> — the raw "how much recent credible coverage" number inside the Signal Score. Duplicate articles about the same event count once.</p>
  <p><b>BD Priority (P1 / P2 / P3)</b> — a separate question: "should TAG act now?" A 0–100 score from eight weighted factors: <b>trigger strength 25%</b> (the strongest verified action — committed capex or capacity strongest, land/M&amp;A next, JV next, hiring weakest — discounted by age), <b>TAG fit 15%</b>, <b>buyer access 15%</b>, <b>cross-border motion 10%</b>, <b>policy exposure 10%</b>, <b>deal size 10%</b>, <b>timing 10%</b>, <b>source quality 5%</b>. <b>P1 = 65+ · P2 = 40+ · P3 below.</b> Guardrail: if the evidence is only market commentary or only low-quality sources, the account can never rank above P3 regardless of score. That's why a company can have a high Signal Score but sit at P3, or a modest score but be P1 on one big verified deal. Expand any prospect's Evidence drawer to see the exact factor-by-factor breakdown.</p>
  <p><b>Confidence</b> — <b>high</b> = a captured deal value or a filed partnership; <b>med</b> = established or announced India presence; <b>low</b> = neither yet. <b>Fee viability</b> — whether the account clears TAG's fee bar: a mega-fund/hyperscaler backer, a deal ≥ $500M (high) or ≥ $50M (medium), or a listed entity.</p>
  </div></details>`;
}

/* ---------- STREAM DETAIL VIEWS ---------- */
function streamHero(s,n){
  return `<div class="shero"><div class="sicon"><i class="ti ${s.icon}"></i></div>
    <div><h1>Data Centres · ${s.name}</h1><p>${s.sheet} · ${s.desc}</p></div>
    <div class="sstats"><div class="sstat"><span class="n">${n}</span><span class="l">${s.unit}</span></div></div></div>`;
}
function viewStreamNews(s){
  const rows=(DATA.events||[]).map((e,i)=>Object.assign({_i:i},e));
  const cols=[{label:'Event',key:'headline',style:'width:40%'},{label:'Articles',key:'n_articles'},{label:'Sources',key:'n_sources'},{label:'Layer',key:'layer'},{label:'Geo',key:'geo'},{label:'Last seen',key:'last_seen'},{label:''}];
  const rowFn=e=>{
    const arts=(e.articles||[]).map(a=>`<div class="cart"><div class="cs">${esc(a.source||'—')}</div><div class="ch" title="${esc(a.title)}">${titleLink(a.title,a.url)}</div><div class="cd">${shortDate(a.date)}</div>${extLink(a.url)||'<span style="width:16px"></span>'}</div>`).join('');
    return `<tr id="hit-news-${e._i}"><td class="cellh"><b>${esc(e.headline||'—')}</b><div style="margin-top:5px"><span class="evtx" id="exp-ev${e._i}" onclick="toggleEl('sub-ev${e._i}','exp-ev${e._i}')"><i class="ti ti-chevron-down"></i>${(e.articles||[]).length} source articles</span></div></td>
      <td class="mono">${e.n_articles??'—'}</td><td class="mono">${e.n_sources??'—'}</td><td>${dash(e.layer)}</td><td><span class="tag geo">${esc(e.geo||'—')}</span></td><td class="mono">${shortDate(e.last_seen)}</td><td>${esc(e.event_id||'')}</td></tr>
    <tr id="sub-ev${e._i}" class="subrow" style="display:none"><td colspan="7">${arts||emptyState('No linked articles.')}</td></tr>`;
  };
  return streamHero(s,rows.length)+renderTable('tblNews',cols,rows,rowFn,'last_seen');
}
function viewStreamPolicy(s){
  const rows=(DATA.policy||[]).map((p,i)=>Object.assign({_i:i},p));
  const cols=[{label:'Date',key:'date'},{label:'Geo',key:'geo'},{label:'Type',key:'type'},{label:'Title',key:'title',style:'width:44%'},{label:'Source',key:'source'},{label:''}];
  const rowFn=p=>`<tr id="hit-policy-${p._i}"><td class="mono">${shortDate(p.date)}</td><td><span class="tag geo">${esc(p.geo||'—')}</span></td>
    <td><span class="tag plain">${esc(p.policy_class||p.type||'—')}</span></td>
    <td class="cellh">${titleLink(p.title,p.url)}</td><td>${dash(p.source)}</td><td>${extLink(p.url)}</td></tr>`;
  return streamHero(s,rows.length)+renderTable('tblPolicy',cols,rows,rowFn,'date');
}
function viewStreamDisclosure(s){
  const rows=(DATA.disclosures||[]).map((d,i)=>Object.assign({_i:i},d));
  const cols=[{label:'Filed',key:'filed_date'},{label:'Filer',key:'filer'},{label:'Form',key:'form'},{label:'Region',key:'region'},{label:'Deal type',key:'deal_type'},{label:'Confidence <i class="ti ti-info-circle" title="How tightly the filing ties data centres + the region + a concrete action together. high = 3+ distinct verified signals in the filing."></i>',key:'confidence'},{label:'Relevance & evidence',style:'width:36%'},{label:''}];

function viewStream(key){

/* ---------- PROSPECTS ---------- */
function priRank(p){const m=/^P([123])/.exec(p||'');return m?+m[1]:9;}
const FLBL={'trigger strength':'Trigger strength','tag fit':'TAG fit','buyer access':'Buyer access','cross border':'Cross-border motion','policy exposure':'Policy exposure','deal size':'Deal size','timing':'Timing','source confidence':'Source quality'};
function fbRows(s){
  const m=[...String(s).matchAll(/([a-z ]+?)\s+([\d.]+)×([\d.]+)→(\d+)/g)];
  if(!m.length)return `<div class="mono" style="font-size:11.5px;color:var(--ink-2);line-height:1.7">${esc(s)}</div>`;
  return '<div class="fbgrid">'+m.map(x=>{
    const max=Math.round(+x[3]*100),pts=+x[4],lbl=FLBL[x[1].trim()]||x[1].trim();
    return `<div class="fbrow"><span class="fbl">${esc(lbl)}</span><div class="fbbar"><div style="width:${max?Math.min(100,pts/max*100):0}%"></div></div><span class="fbv">${pts}<span class="fbm">/${max}</span></span></div>`;
  }).join('')+'</div>';
}

    <div class="pco"><h3>${esc(p.company)}</h3>${chips}</div>

    </div>

      <div class="sblock"><div class="sl"><span>Signal score</span></div><span class="sval2">${num(p.signal_score,0)}</span> ${bandTag(p.signal_band)}</div>

      <div class="sblock"><div class="sl"><span>BD score</span></div><span class="sval2">${p.bd_score==null?'—':esc(p.bd_score)}</span></div>
      ${p.fee_viability?`<div class="sblock"><div class="sl"><span>Fee viability</span></div><span style="font-size:12px">${esc(p.fee_viability)}</span></div>`:''}
    </div></div>

      <span class="fmeta"><i class="ti ti-broadcast"></i>${dash(p.signals)}</span>

/* ---------- ROUTER ---------- */
function crumb(parts){document.getElementById('crumb').innerHTML='<span class="clk" onclick="go(\'home\')">TAG</span>'+parts.map(p=>`<span class="sep">/</span>${p.click?`<span class="clk" onclick="${p.click}">${esc(p.t)}</span>`:`<b>${esc(p.t)}</b>`}`).join('');}
function setNav(sel){document.querySelectorAll('.nlink').forEach(n=>n.classList.remove('on'));if(sel)sel.classList.add('on');}
function paintAll(){for(const id in TBL)paintTbl(id);}
function show(html){document.getElementById('view').innerHTML=html;paintAll();window.scrollTo(0,0);}

function go(view){
  if(!DATA)return;
  for(const k in TBL)delete TBL[k];
  setNav(document.querySelector(`.nlink[data-view="${view}"]`));
  if(view==='home'){crumb([{t:'Overview'}]);show(viewHome());}
  else if(view==='prospects'){crumb([{t:'Prospects'}]);show(viewProspects());}
  else if(view==='md'){crumb([{t:'MD View'}]);show(viewMD());}
  else if(view==='gcc'){crumb([{t:'GCC Watch'}]);show(viewGCC());}
  else if(view==='ai'){crumb([{t:'AI Summary'}]);show(viewAI());}
  else if(view==='health'){crumb([{t:'Feed health'}]);show(viewHealth());}
  else if(view==='states'){crumb([{t:'State Targeting'}]);show(viewStates());}
}
function openSector(key){
  if(!DATA)return;
  for(const k in TBL)delete TBL[k];
  setNav(document.querySelector(`.nlink[data-sector="${key}"]`));
  if(key==='dc'){crumb([{t:'Sectors',click:"go('home')"},{t:'Data Centres'}]);show(viewSectorDC());}
  else{crumb([{t:'Sectors',click:"go('home')"},{t:key}]);show(viewSoon(key,key==='Energy'?'ti-bolt':'ti-shield',`${key} comes online after Data Centres. Same six-stream template — news, policy, disclosures, OSINT, ranked operators and BD pipeline — pointed at ${key}-specific sources.`));}
}
function openStream(key){
  if(!DATA)return;
  for(const k in TBL)delete TBL[k];
  const s=STREAMS.find(x=>x.key===key);if(!s)return;
  setNav(document.querySelector('.nlink[data-sector="dc"]'));
  crumb([{t:'Sectors',click:"go('home')"},{t:'Data Centres',click:"openSector('dc')"},{t:s.name}]);
  show(viewStream(key));
}

document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('.nlink');if(!a||!DATA)return;if(a.dataset.view)go(a.dataset.view);else if(a.dataset.sector)openSector(a.dataset.sector);});

  (DATA.policy||[]).forEach((p,i)=>add('Policy',p.title,[p.geo,p.policy_class||p.type].filter(Boolean).join(' · '),[p.title,p.geo,p.source,p.policy_class],'hit-policy-'+i,()=>openStream('policy')));
  (DATA.osint||[]).forEach((o,i)=>add('Hiring / OSINT',o.actor||o.signal_type,[o.signal_type,o.geo].filter(Boolean).join(' · '),[o.actor,o.excerpt,o.signal_type,o.geo],'hit-osint-'+i,()=>openStream('osint')));
}
const SGROUPS=[['Prospects','--talent'],['Disclosures','--disc'],['News','--news'],['Policy','--policy'],['Hiring / OSINT','--osint']];
function runSearch(q){
  const drop=document.getElementById('sdrop');
  q=(q||'').trim().toLowerCase();
  if(q.length<2){drop.hidden=true;drop.innerHTML='';return;}
  const toks=q.split(/\s+/);
  let total=0,html='';
  SGROUPS.forEach(([g,dot])=>{
    if(total>=25)return;
    let n=0,rows='';
    for(let i=0;i<SIDX.length;i++){
      const it=SIDX[i];
      if(it.type!==g||!toks.every(t=>it.hay.includes(t)))continue;
      rows+=`<div class="srow" onclick="jumpTo(${i})"><span class="sl2">${esc(it.label)}</span><span class="sm">${esc(it.sub)}</span></div>`;
      if(++n>=5)break;
    }
    if(n){html+=`<div class="sgroup"><span class="gdot" style="background:var(${dot})"></span>${g}</div>${rows}`;total+=n;}
  });
  drop.innerHTML=html||'<div class="snone">No matches across prospects, disclosures, news, policy or OSINT.</div>';
  drop.hidden=false;
}
function jumpTo(i){
  const h=SIDX[i];if(!h)return;
  document.getElementById('sdrop').hidden=true;
  document.getElementById('sinput').value='';
  h.nav(); /* show() renders synchronously, so the target row exists right after */
  const el=document.getElementById(h.domId);
  if(el){el.scrollIntoView({block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),2200);}
}
(function(){
  const inp=document.getElementById('sinput');let t=null;
  inp.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(()=>runSearch(inp.value),150);});
  inp.addEventListener('keydown',e=>{
    if(e.key==='Escape'){document.getElementById('sdrop').hidden=true;inp.blur();}
    else if(e.key==='Enter'){const f=document.querySelector('#sdrop .srow');if(f)f.click();}
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))document.getElementById('sdrop').hidden=true;});
})();

/* ---------- BOOT ---------- */
function bootError(detail){
  document.getElementById('view').innerHTML=`<div class="errpg"><i class="ti ti-plug-connected-x"></i>
    <h3>Data feed unavailable</h3><p>data feed unavailable — check the daily pipeline run.<br>${esc(detail||'')}</p>
    <button class="fbtn" onclick="boot()"><i class="ti ti-refresh"></i>Retry</button></div>`;
}
function boot(){
  document.getElementById('view').innerHTML='<div class="loadpg"><div class="spin"></div>Loading intelligence feed…</div>';
  fetch('./data.json',{cache:'no-store'}).then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(d=>{
    DATA=d;
    buildIndex();
    const badge=document.getElementById('pBadge');if(badge)badge.textContent=(d.prospects||[]).length;
    const feeds=(d.health&&d.health.feeds)||{};
    const bad=Object.values(feeds).some(f=>f.status!=='ok');
    const fr=document.getElementById('freshness');
    fr.innerHTML=`<span class="fled ${bad?'warn':''}"></span>data as of ${esc(d.generated_at||'—')}`;
    fr.onclick=()=>go('health');
    go('home');
  }).catch(err=>bootError(err&&err.message));
}
boot();
</script></body></html>
